{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <title>Tamkin | Success </title>
    <link href="{% static 'assets/img/logo2.png' %}" rel="icon">
    <link href="{% static 'assets/css/register.css' %}" rel="stylesheet">

    <!-- Google Tag Manager -->
    <script>(function (w, d, s, l, i) {
            w[l] = w[l] || []; w[l].push({
                'gtm.start':
                    new Date().getTime(), event: 'gtm.js'
            }); var f = d.getElementsByTagName(s)[0],
                j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
                    'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-PHSRNNDG');</script>
    <!-- End Google Tag Manager -->
</head>

<body>

    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PHSRNNDG" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div class="my-container text-center">

        <!-- LOGO -->
        <div class="logo mb-4">
            <img src="{% static 'assets/img/logo2.png' %}" alt="">
            <div class="titles">
                <h2 class="k-letter">تمكين</h2>
                <h2 class="k-letter">Tamkin</h2>
            </div>
        </div>

        <!-- SUCCESS CARD -->
        <div class="form-card p-4">

            <h2 class="title mb-3 text-center title">
                <i class="bi bi-check-circle-fill"></i>
                تم التسجيل بنجاح
            </h2>

            <p class="mb-4">
                شكراً لتسجيلك في منصة تمكين <br>
                تم استلام معلوماتك بنجاح.
            </p>


            <div class="alert alert-info">
                رمز تسجيلك :
                <strong>{{ register.code }}</strong>
            </div>

            <div class=" text-danger text-center">
                <strong> مهم: </strong> يرجى الاحتفاظ بهذا الرمز لاي استفسار
            </div>


            <div class="mt-4">
                <a href="{% url 'index' %}" class="btn btn-success">
                    الصفحة الرئيسية
                </a>
            </div>

        </div>

    </div>

</body>

</html>
